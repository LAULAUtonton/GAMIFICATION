<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocabulary Station</title>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  margin:0;
  font-family: system-ui, sans-serif;
  background:#f4f6fb;
  padding:20px;
}

h1{
  margin:0 0 20px 0;
  font-size:28px;
}

.controls{
  margin-bottom:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button, select{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-weight:700;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:transform .15s ease;
}

.card:hover{
  transform:translateY(-2px);
}

.icon{
  margin-bottom:10px;
  line-height:0;
}

.icon svg{
  width:36px;
  height:36px;
  stroke-width:2.25;
}

.word{
  font-size:22px;
  font-weight:900;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:6px;
}

.pos{
  font-size:12px;
  font-weight:900;
  color:#6b7280;
  background:#f3f4f6;
  border:1px solid #e5e7eb;
  padding:2px 8px;
  border-radius:999px;
}

.cat{
  font-size:12px;
  font-weight:900;
  color:#111827;
  background:#e0f2fe;
  border:1px solid #bae6fd;
  padding:2px 8px;
  border-radius:999px;
}

.back{
  font-size:16px;
  color:#374151;
  font-weight:800;
  margin-bottom:6px;
}

.meta{
  font-size:13px;
  color:#6b7280;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <h1>Vocabulary Station — Synchronize 2</h1>
  <div class="controls">
    <select id="unitSelect"></select>
    <button id="shuffleBtn">Shuffle</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script type="module">
import { VOCAB_DB, getCards, shuffle, listUnits } from "./vocabulary.js";
import { getAccentColor } from "./vocab-icon-engine.js";

const grid = document.getElementById("grid");
const unitSelect = document.getElementById("unitSelect");
const shuffleBtn = document.getElementById("shuffleBtn");

let cards = [];

/* Populate unit dropdown */
function initUnits(){
  const units = listUnits(VOCAB_DB);
  unitSelect.innerHTML =
    `<option value="all">All Units</option>` +
    units.map(u => `<option value="${u.unit}">Unit ${u.unit}</option>`).join("");
}

/* Render cards */
function render(){
  grid.innerHTML = cards.map(card => `
    <div class="card">
      <div class="icon" style="color:${getAccentColor(card.setId)}">
        <i data-lucide="${card.icon}"></i>
      </div>

      <div class="word">
        <span class="front">${card.front}</span>
        ${card.pos ? `<span class="pos">(${card.pos})</span>` : ``}
        ${card.setLabel ? `<span class="cat">${card.setLabel}</span>` : ``}
      </div>

      ${card.back ? `<div class="back">${card.back}</div>` : ``}

      <div class="meta">Unit ${card.unit} · ${card.setLabel}</div>
    </div>
  `).join("");

  // important: re-render lucide icons each time
  lucide.createIcons();
}

/* Load cards */
function load(){
  const unitVal = unitSelect.value;
  if(unitVal === "all"){
    cards = getCards(VOCAB_DB);
  } else {
    cards = getCards(VOCAB_DB, { unit: Number(unitVal) });
  }
  render();
}

/* Events */
unitSelect.addEventListener("change", load);
shuffleBtn.addEventListener("click", ()=>{
  cards = shuffle(cards);
  render();
});

/* Init */
initUnits();
load();
</script>

</body>
</html>
