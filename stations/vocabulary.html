<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Station — Synchronize 2</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#f4f6fb;
}

header{
  background:#ffffff;
  padding:16px;
  border-bottom:2px solid #e0e4ef;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:20px;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select, button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ccd3e0;
  font-weight:600;
  cursor:pointer;
  background:white;
}

button:hover{
  background:#eef2ff;
}

main{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.icon{
  width:72px;
  height:72px;
}

.icon img{
  width:72px;
  height:72px;
  object-fit:contain;
}

.word{
  font-size:22px;
  font-weight:800;
}

.back{
  font-size:18px;
  color:#555;
}

.meta{
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>Vocabulary Station — Synchronize 2</h1>

  <div class="controls">
    <select id="unitSelect"></select>
    <select id="setSelect"></select>
    <button id="shuffleBtn">Shuffle</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script type="module">
import { VOCAB_DB, listUnits, listSets, getCards, shuffle } from "./vocabulary.js";

const unitSelect = document.getElementById("unitSelect");
const setSelect = document.getElementById("setSelect");
const grid = document.getElementById("grid");
const shuffleBtn = document.getElementById("shuffleBtn");

let cards = [];

function initUnits(){
  const units = listUnits(VOCAB_DB);

  unitSelect.innerHTML =
    `<option value="all">All units</option>` +
    units.map(u =>
      `<option value="${u.unit}">Unit ${u.unit}: ${u.title}</option>`
    ).join("");

  initSets("all");
}

function initSets(unitVal){
  const unitNum = unitVal === "all" ? null : Number(unitVal);
  const sets = listSets(VOCAB_DB, unitNum);

  setSelect.innerHTML =
    `<option value="all">All sets</option>` +
    sets.map(s =>
      `<option value="${s.setId}">U${s.unit}: ${s.label}</option>`
    ).join("");
}

function loadCards(){
  const unitVal = unitSelect.value;
  const setVal = setSelect.value;

  const unitNum = unitVal === "all" ? null : Number(unitVal);
  const setId = setVal === "all" ? null : setVal;

  cards = getCards(VOCAB_DB, { unit: unitNum, setId });
  render();
}

function render(){
  grid.innerHTML = cards.map(card => `
    <div class="card">
      <div class="icon">
        <img src="${card.image}" alt="">
      </div>
      <div class="word">${card.front}</div>
      ${card.back ? `<div class="back">${card.back}</div>` : ``}
      <div class="meta">Unit ${card.unit} · ${card.setLabel}</div>
    </div>
  `).join("");
}

shuffleBtn.addEventListener("click", () => {
  cards = shuffle(cards);
  render();
});

unitSelect.addEventListener("change", () => {
  initSets(unitSelect.value);
  loadCards();
});

setSelect.addEventListener("change", loadCards);

initUnits();
loadCards();

</script>

</body>
</html>
