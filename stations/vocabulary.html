<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocabulary Station</title>

<style>
  :root{
    /* Pistachio + Ocher palette */
    --bg: #0f1411;             /* deep green-black */
    --panel: rgba(211, 242, 211, .10);
    --panel2: rgba(211, 242, 211, .08);
    --stroke: rgba(211, 242, 211, .18);

    --pist: #bfe7c6;           /* pistachio */
    --pist2:#8fd3a2;           /* stronger pistachio */
    --ocher:#d7a84b;           /* ocher accent */
    --ocher2:#c28f2d;

    --text:#f4fff6;
    --muted: rgba(244,255,246,.78);
    --muted2: rgba(244,255,246,.62);

    --radius: 18px;
    --shadow: 0 14px 28px rgba(0,0,0,.35);
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(900px 500px at 15% 10%, rgba(191,231,198,.14), transparent 60%),
      radial-gradient(800px 520px at 90% 20%, rgba(215,168,75,.10), transparent 55%),
      linear-gradient(180deg, #0b110d, var(--bg));
    color: var(--text);
    min-height:100vh;
  }

  .wrap{
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 18px 26px;
  }

  /* Header (like other stations) */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding: 14px 14px;
    border-radius: var(--radius);
    background: rgba(191,231,198,.08);
    border: 1px solid var(--stroke);
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
    margin-bottom: 14px;
  }

  .titleWrap{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .title{
    font-size: 30px;
    font-weight: 1000;
    letter-spacing:.2px;
    margin:0;
  }
  .subtitle{
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
    margin:0;
  }

  .headerActions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .btn{
    border:none;
    cursor:pointer;
    border-radius: 14px;
    padding: 10px 14px;
    font-weight: 1000;
    font-size: 14px;
    letter-spacing:.2px;
    transition: transform .06s ease, filter .15s ease;
    user-select:none;
  }
  .btn:active{ transform: translateY(1px); }

  .btn.pist{
    background: rgba(191,231,198,.92);
    color:#0b110d;
  }
  .btn.pist:hover{ filter: brightness(.95); }

  .btn.ocher{
    background: rgba(215,168,75,.95);
    color:#1b1406;
  }
  .btn.ocher:hover{ filter: brightness(.95); }

  .btn.ghost{
    background: rgba(244,255,246,.08);
    border: 1px solid var(--stroke);
    color: var(--text);
  }
  .btn.ghost:hover{ background: rgba(244,255,246,.12); }

  /* Main panel */
  .panel{
    border-radius: var(--radius);
    background: var(--panel);
    border: 1px solid var(--stroke);
    box-shadow: var(--shadow);
    padding: 14px;
  }

  /* Controls row */
  .controls{
    display:grid;
    grid-template-columns: 1.15fr 1.85fr .9fr 1.4fr 1.2fr;
    gap: 12px;
    align-items: end;
    margin-bottom: 12px;
  }

  .control{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  label{
    font-size: 12px;
    font-weight: 1000;
    color: var(--muted2);
    letter-spacing:.25px;
  }

  select, input{
    width:100%;
    padding: 12px 12px;
    border-radius: 14px;
    border: 1px solid var(--stroke);
    background: rgba(11,17,13,.55);
    color: var(--text);
    font-weight: 900;
    font-size: 16px;
    outline:none;
  }

  .modeRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom: 12px;
  }

  .pill{
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid var(--stroke);
    background: rgba(244,255,246,.06);
    color: var(--text);
    font-weight: 1000;
    cursor:pointer;
  }
  .pill.active{
    background: rgba(215,168,75,.22);
    border-color: rgba(215,168,75,.35);
  }

  .stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom: 12px;
  }
  .chip{
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--stroke);
    background: rgba(244,255,246,.06);
    font-weight: 1000;
    font-size: 13px;
    color: var(--muted);
  }

  /* Grid */
  #vocabGrid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
    gap: 14px;
  }

  .vcard{
    border-radius: 18px;
    padding: 14px;
    border: 2px solid rgba(244,255,246,.14);
    background: rgba(244,255,246,.06);
    box-shadow: 0 12px 24px rgba(0,0,0,.22);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    text-align:left;
  }
  .vcard:hover{ border-color: rgba(215,168,75,.32); }
  .vcard:focus{ outline: 3px solid rgba(215,168,75,.35); }

  .vcard-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 8px;
  }
  .v-emoji{ font-size: 34px; }
  .v-sticker{ font-size: 22px; opacity:.95; }

  .vword{
    font-size: 26px;
    font-weight: 1000;
    line-height: 1.05;
    margin: 4px 0 8px;
  }
  .vback{
    font-size: 18px;
    font-weight: 900;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .vmeta{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size: 12px;
    font-weight: 1000;
    color: var(--muted2);
  }

  /* accents (flat outlines only) */
  .accent-mint   { outline:3px solid rgba(143,211,162,.18); }
  .accent-yellow { outline:3px solid rgba(215,168,75,.18); }
  .accent-blue   { outline:3px solid rgba(120,190,255,.14); }
  .accent-pink   { outline:3px solid rgba(255,140,210,.14); }
  .accent-purple { outline:3px solid rgba(190,140,255,.14); }
  .accent-orange { outline:3px solid rgba(255,170,110,.14); }
  .accent-green  { outline:3px solid rgba(140,255,140,.14); }
  .accent-red    { outline:3px solid rgba(255,120,120,.14); }

  /* patterns */
  .pattern-dots::before,
  .pattern-diagonal::before,
  .pattern-grid::before,
  .pattern-pixels::before,
  .pattern-waves::before,
  .pattern-confetti::before,
  .pattern-bubbles::before,
  .pattern-circuits::before,
  .pattern-rings::before,
  .pattern-stripes::before,
  .pattern-bricks::before,
  .pattern-stars::before,
  .pattern-hearts::before,
  .pattern-wind::before{
    content:"";
    position:absolute;
    inset:-40px;
    opacity:.14;
    pointer-events:none;
    background-size: 40px 40px;
    color: rgba(191,231,198,.85);
  }
  .pattern-dots::before{ background-image: radial-gradient(currentColor 2px, transparent 2px); }
  .pattern-grid::before{
    background-image:
      linear-gradient(to right, currentColor 1px, transparent 1px),
      linear-gradient(to bottom, currentColor 1px, transparent 1px);
  }
  .pattern-diagonal::before{ background-image: linear-gradient(135deg, currentColor 2px, transparent 2px); }
  .pattern-stripes::before{ background-image: linear-gradient(90deg, currentColor 7px, transparent 7px); }
  .pattern-pixels::before{
    background-image:
      linear-gradient(to right, currentColor 6px, transparent 6px),
      linear-gradient(to bottom, currentColor 6px, transparent 6px);
    background-size: 18px 18px;
  }
  .pattern-waves::before{ background-image: radial-gradient(circle at 10px 10px, currentColor 2px, transparent 4px); }
  .pattern-confetti::before{ background-image: radial-gradient(currentColor 2px, transparent 3px); background-size: 22px 22px; }
  .pattern-bubbles::before{ background-image: radial-gradient(currentColor 2px, transparent 6px); background-size: 26px 26px; }
  .pattern-circuits::before{
    background-image:
      linear-gradient(to right, currentColor 2px, transparent 2px),
      linear-gradient(to bottom, currentColor 2px, transparent 2px);
    background-size: 30px 30px;
  }
  .pattern-rings::before{ background-image: radial-gradient(transparent 12px, currentColor 13px, transparent 14px); background-size: 34px 34px; }

  /* Quiz panel */
  .quiz{
    grid-column: 1 / -1;
    padding: 18px;
    border-radius: 18px;
    background: rgba(244,255,246,.06);
    border: 2px solid rgba(244,255,246,.14);
    position:relative;
    overflow:hidden;
  }
  .quiz-emoji{ font-size: 56px; margin-bottom: 8px; }
  .quiz-q{ font-size: 20px; font-weight: 1000; margin-bottom: 12px; }
  .quiz-opts{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:12px;
    margin-bottom: 10px;
  }
  .qopt{
    padding:14px 12px;
    border-radius: 14px;
    border: 1px solid var(--stroke);
    background: rgba(11,17,13,.55);
    color: var(--text);
    font-weight: 1000;
    font-size: 18px;
    cursor:pointer;
  }
  .qopt.ok{ outline: 3px solid rgba(143,211,162,.28); }
  .qopt.bad{ outline: 3px solid rgba(255,120,120,.28); }
  .quiz-meta{ font-size: 13px; font-weight: 1000; color: var(--muted2); }

  @media (max-width: 980px){
    .controls{ grid-template-columns: 1fr 1fr; }
    .header{ flex-direction:column; align-items:flex-start; }
    .headerActions{ width:100%; justify-content:flex-start; }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="titleWrap">
        <h1 class="title">Vocabulary Station</h1>
        <p class="subtitle">Pistachio mode • Visual cards + Quiz • Units 1–8</p>
      </div>

      <div class="headerActions">
        <button class="btn pist" id="backBtn">Back</button>
        <button class="btn ocher" id="mainBtn">Main Menu</button>
        <button class="btn ghost" id="pauseBtn">Pause</button>
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="control">
          <label>Unit</label>
          <select id="unitSelect"></select>
        </div>

        <div class="control">
          <label>Set</label>
          <select id="setSelect"></select>
        </div>

        <div class="control">
          <label>Show</label>
          <select id="countSelect">
            <option value="18">18</option>
            <option value="30" selected>30</option>
            <option value="45">45</option>
          </select>
        </div>

        <div class="control">
          <label>Search</label>
          <input id="searchInput" placeholder="type: dentist, agree, market..." />
        </div>

        <div class="control">
          <label>Actions</label>
          <div style="display:flex; gap:10px;">
            <button class="btn ocher" id="shuffleBtn" style="width:100%;">Shuffle</button>
            <button class="btn ghost" id="resetBtn" style="width:100%;">Reset</button>
          </div>
        </div>
      </div>

      <div class="modeRow">
        <button class="pill active" id="modeCards">Cards</button>
        <button class="pill" id="modeQuiz">Quiz</button>
      </div>

      <div class="stats" id="statsRow"></div>

      <div id="vocabGrid"></div>
    </div>
  </div>

<script>
  // Update these paths to match YOUR project navigation
  document.getElementById("backBtn").onclick = () => history.back();
  document.getElementById("mainBtn").onclick = () => location.href = "../index.html";
  document.getElementById("pauseBtn").onclick = () => alert("Paused");
</script>

<script type="module">
  import { VOCAB_DB, listUnits, listSets, getCards, shuffle } from "./vocabulary.js";

  const unitSelect = document.getElementById("unitSelect");
  const setSelect  = document.getElementById("setSelect");
  const countSelect= document.getElementById("countSelect");
  const searchInput= document.getElementById("searchInput");
  const grid       = document.getElementById("vocabGrid");
  const statsRow   = document.getElementById("statsRow");

  const modeCardsBtn = document.getElementById("modeCards");
  const modeQuizBtn  = document.getElementById("modeQuiz");
  const shuffleBtn   = document.getElementById("shuffleBtn");
  const resetBtn     = document.getElementById("resetBtn");

  let mode = "cards";

  function escapeHTML(s="") {
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function populateUnits() {
    const units = listUnits(VOCAB_DB);
    unitSelect.innerHTML =
      `<option value="all">All units</option>` +
      units.map(u => `<option value="${u.unit}">Unit ${u.unit} — ${escapeHTML(u.title)}</option>`).join("");
  }

  function populateSets(unitValue) {
    const unitNum = unitValue === "all" ? null : Number(unitValue);
    const sets = listSets(VOCAB_DB, unitNum);
    setSelect.innerHTML =
      `<option value="all">All sets</option>` +
      sets.map(s => `<option value="${s.setId}">U${s.unit} — ${escapeHTML(s.label)}</option>`).join("");
  }

  function cardToHTML(card) {
    const emoji = card.visual?.emoji || "📘";
    const sticker = card.visual?.sticker || "";
    const pattern = card.visual?.pattern || "dots";
    const accent = card.visual?.accent || "mint";

    return `
      <button class="vcard pattern-${pattern} accent-${accent}">
        <div class="vcard-top">
          <div class="v-emoji">${emoji}</div>
          <div class="v-sticker">${sticker}</div>
        </div>
        <div class="vword">${escapeHTML(card.front)}</div>
        ${card.back ? `<div class="vback">${escapeHTML(card.back)}</div>` : ``}
        <div class="vmeta"><span>U${card.unit}</span><span>${escapeHTML(card.setLabel)}</span></div>
      </button>
    `;
  }

  function getFilteredCards() {
    const unitValue = unitSelect.value;
    const setValue  = setSelect.value;
    const query = searchInput.value.trim().toLowerCase();

    const unitNum = unitValue === "all" ? null : Number(unitValue);
    const setId   = setValue === "all" ? null : setValue;

    let cards = getCards(VOCAB_DB, { unit: unitNum, setId });

    if (query) {
      cards = cards.filter(c =>
        String(c.front).toLowerCase().includes(query) ||
        String(c.back||"").toLowerCase().includes(query) ||
        String(c.setLabel).toLowerCase().includes(query) ||
        String(c.unitTitle).toLowerCase().includes(query)
      );
    }
    return cards;
  }

  function renderStats(cards) {
    const unitValue = unitSelect.value;
    const setValue  = setSelect.value;
    const q = searchInput.value.trim();

    const chips = [
      `Cards: ${cards.length}`,
      `Mode: ${mode.toUpperCase()}`,
      unitValue === "all" ? "All Units" : `Unit ${unitValue}`,
      setValue === "all" ? "All Sets" : `Set: ${setValue}`,
      q ? `Search: "${escapeHTML(q)}"` : "Search: —"
    ];

    statsRow.innerHTML = chips.map(t => `<div class="chip">${t}</div>`).join("");
  }

  function render() {
    let cards = getFilteredCards();
    renderStats(cards);

    if (cards.length === 0) {
      grid.innerHTML = `<div class="quiz"><div class="quiz-q">No results. Try different filters/search.</div></div>`;
      return;
    }

    cards = shuffle(cards);
    const limit = Number(countSelect.value);

    if (mode === "cards") {
      const shown = cards.slice(0, limit);
      grid.innerHTML = shown.map(cardToHTML).join("");
      return;
    }

    // QUIZ MODE: emoji -> choose correct word/phrase
    const pool = cards.slice(0, Math.max(8, limit));
    const qCard = pool[0];
    const wrong = pool.slice(1).map(c => c.front).filter(w => w !== qCard.front);
    const options = shuffle([qCard.front, ...wrong.slice(0, 3)]);

    grid.innerHTML = `
      <div class="quiz">
        <div class="quiz-emoji">${qCard.visual?.emoji || "📘"}</div>
        <div class="quiz-q">Choose the correct word / phrase</div>
        <div class="quiz-opts">
          ${options.map(o => `<button class="qopt" data-ok="${o === qCard.front}">${escapeHTML(o)}</button>`).join("")}
        </div>
        <div class="quiz-meta">U${qCard.unit} — ${escapeHTML(qCard.setLabel)}</div>
      </div>
    `;

    grid.querySelectorAll(".qopt").forEach(btn => {
      btn.addEventListener("click", () => {
        const ok = btn.dataset.ok === "true";
        btn.classList.add(ok ? "ok" : "bad");
        setTimeout(render, 550);
      });
    });
  }

  function setMode(next) {
    mode = next;
    modeCardsBtn.classList.toggle("active", mode === "cards");
    modeQuizBtn.classList.toggle("active", mode === "quiz");
    render();
  }

  // Events
  unitSelect.onchange = () => { populateSets(unitSelect.value); render(); };
  setSelect.onchange = render;
  countSelect.onchange = render;
  shuffleBtn.onclick = render;
  resetBtn.onclick = () => {
    unitSelect.value = "all";
    populateSets("all");
    setSelect.value = "all";
    countSelect.value = "30";
    searchInput.value = "";
    setMode("cards");
  };
  searchInput.addEventListener("input", render);

  modeCardsBtn.onclick = () => setMode("cards");
  modeQuizBtn.onclick  = () => setMode("quiz");

  // Init
  populateUnits();
  populateSets("all");
  setSelect.value = "all";
  render();
</script>

</body>
</html>
